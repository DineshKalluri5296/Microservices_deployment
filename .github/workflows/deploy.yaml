name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-west-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region us-west-1 --name eksmlops

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f productdeployments.yaml
        kubectl apply -f productservices.yaml
        kubectl apply -f orderdeployments.yaml
        kubectl apply -f orderservices.yaml
